apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: syvazonepolicies.syva.dev
spec:
  group: syva.dev
  scope: Namespaced
  names:
    plural: syvazonepolicies
    singular: syvazonepolicy
    kind: SyvaZonePolicy
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
