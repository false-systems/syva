# Namespace, service account, and RBAC for the Syva DaemonSet.
apiVersion: v1
kind: Namespace
metadata:
  name: syva-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: syva
  namespace: syva-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: syva-k8s
rules:
  - apiGroups: ["syva.dev"]
    resources: ["syvazonepolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["syva.dev"]
    resources: ["syvazonepolicies/status"]
    verbs: ["patch", "update"]
  # Pod watch is cluster-wide: membership is node-scoped (field selector on
  # spec.nodeName) but the pod-IP → zone map needs every node's pod IPs.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: syva-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: syva-k8s
subjects:
  - kind: ServiceAccount
    name: syva
    namespace: syva-system
