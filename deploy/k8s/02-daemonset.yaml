# Syva — node-local eBPF enforcement: syva-core + syva-k8s adapter per node.
#
# The core's Unix socket lives on the host at /run/syva/syva-core.sock so
# node-local tooling (syvactl, verify-deployment) can reach the same core the
# adapter uses. Host access required: BPF pins (/sys/fs/bpf), kernel BTF,
# cgroup v2, host /proc (container PID → cgroup resolution), hostPID.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: syva
  namespace: syva-system
  labels:
    app: syva
spec:
  selector:
    matchLabels:
      app: syva
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: syva
    spec:
      hostPID: true
      priorityClassName: system-node-critical
      serviceAccountName: syva
      tolerations:
        - effect: NoSchedule
          operator: Exists
      initContainers:
        # A crashed core can leave stale BPF pins; the new core refuses to
        # start on them (mutual exclusion), so clear them before startup.
        - name: cleanup-stale-bpf-pins
          image: ghcr.io/false-systems/syva-core:0.4.0
          command: ["sh", "-c", "rm -rf /sys/fs/bpf/syva"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"
          volumeMounts:
            - name: bpf
              mountPath: /sys/fs/bpf
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
              add: ["SYS_ADMIN"]
      containers:
        - name: syva-core
          image: ghcr.io/false-systems/syva-core:0.4.0
          args:
            - --socket-path
            - /run/syva/syva-core.sock
          ports:
            - name: health
              containerPort: 9091
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: health
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
              # SYS_ADMIN is dropped by the core itself after BPF load.
              add: ["BPF", "SYS_ADMIN", "PERFMON"]
          volumeMounts:
            - name: syva-socket
              mountPath: /run/syva
            - name: bpf
              mountPath: /sys/fs/bpf
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: btf
              mountPath: /sys/kernel/btf
              readOnly: true

        - name: syva-adapter-k8s
          image: ghcr.io/false-systems/syva-adapter-k8s:0.4.0
          args:
            - --core-socket
            - /run/syva/syva-core.sock
            - --host-proc
            - /host/proc
            - --host-cgroup
            - /sys/fs/cgroup
            - --metrics-listen
            - $(POD_IP):9092
          ports:
            - name: k8s-metrics
              containerPort: 9092
              protocol: TCP
          env:
            - name: SYVA_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: syva-socket
              mountPath: /run/syva
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: host-proc
              mountPath: /host/proc
              readOnly: true

      volumes:
        # Host path (not emptyDir) so node-local syvactl and the
        # verify-deployment gate reach the same socket. Root-owned; the
        # socket itself is 0660 root:syva inside the container.
        - name: syva-socket
          hostPath:
            path: /run/syva
            type: DirectoryOrCreate
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: btf
          hostPath:
            path: /sys/kernel/btf
            type: Directory
