apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: syva
  namespace: syva-system
  labels:
    app: syva
spec:
  selector:
    matchLabels:
      app: syva
  template:
    metadata:
      labels:
        app: syva
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - effect: NoSchedule
          operator: Exists
      containers:
        - name: syva
          image: ghcr.io/false-systems/syva:latest
          args:
            - --policy-dir
            - /etc/syva/policies
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - BPF
                - SYS_ADMIN
                - PERFMON
          seccompProfile:
            type: RuntimeDefault
          volumeMounts:
            - name: bpf
              mountPath: /sys/fs/bpf
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: btf
              mountPath: /sys/kernel/btf
              readOnly: true
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
            - name: containerd-state
              mountPath: /run/containerd/io.containerd.runtime.v2.task
              readOnly: true
            - name: policies
              mountPath: /etc/syva/policies
              readOnly: true
      volumes:
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: btf
          hostPath:
            path: /sys/kernel/btf
            type: Directory
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
        - name: containerd-state
          hostPath:
            path: /run/containerd/io.containerd.runtime.v2.task
            type: DirectoryOrCreate
        - name: policies
          configMap:
            name: syva-policies
---
apiVersion: v1
kind: Namespace
metadata:
  name: syva-system
