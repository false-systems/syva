syntax = "proto3";
package syva.core.v1;

// The syvä core engine API.
// Adapters (file, k8s, api) connect to this service and issue commands.
// The core programs BPF maps based on these commands.
// The core never knows or cares where commands came from.
service SyvaCore {
    // Zone lifecycle
    rpc RegisterZone(RegisterZoneRequest) returns (RegisterZoneResponse);
    rpc RemoveZone(RemoveZoneRequest) returns (RemoveZoneResponse);
    rpc ListZones(ListZonesRequest) returns (ListZonesResponse);

    // Container membership
    rpc AttachContainer(AttachContainerRequest) returns (AttachContainerResponse);
    rpc DetachContainer(DetachContainerRequest) returns (DetachContainerResponse);

    // Communication policy
    rpc AllowComm(AllowCommRequest) returns (AllowCommResponse);
    rpc DenyComm(DenyCommRequest) returns (DenyCommResponse);
    rpc ListComms(ListCommsRequest) returns (ListCommsResponse);

    // Pod IP to zone resolution
    rpc SetIpZone(SetIpZoneRequest) returns (SetIpZoneResponse);
    rpc RemoveIpZone(RemoveIpZoneRequest) returns (RemoveIpZoneResponse);

    // Inode registration
    rpc RegisterHostPath(RegisterHostPathRequest) returns (RegisterHostPathResponse);

    // Status and observability
    rpc Status(StatusRequest) returns (StatusResponse);
    rpc WatchEvents(WatchEventsRequest) returns (stream DenyEvent);
}

// --- Zone lifecycle ---

message RegisterZoneRequest {
    string zone_name = 1;
    ZonePolicy policy = 2;
}

message RegisterZoneResponse {
    uint32 zone_id = 1;
}

message RemoveZoneRequest {
    string zone_name = 1;
    // If true, drain active containers before removing.
    // If false, reject if containers are attached.
    bool drain = 2;
}

message RemoveZoneResponse {
    bool ok = 1;
    string message = 2;
}

message ListZonesRequest {}

message ListZonesResponse {
    repeated ZoneSummary zones = 1;
}

message ZoneSummary {
    string name = 1;
    uint32 zone_id = 2;
    // One of: "pending", "active", "draining"
    string state = 3;
    uint32 containers_active = 4;
}

// --- Container membership ---

message AttachContainerRequest {
    string container_id = 1;
    string zone_name = 2;
    // cgroup_id resolved by adapter from /proc/{pid}/cgroup
    uint64 cgroup_id = 3;
    string pod_namespace = 4;
    string pod_name = 5;
    string pod_uid = 6;
    // Adapter/source name, for example "file", "kubernetes", or "api".
    string source = 7;
    // Monotonic source generation. Zero means the caller has no source
    // generation / this is an ungenerated local update and must not be treated
    // as stale only because generated state already exists. Non-zero
    // generations are monotonic; stale non-zero updates return
    // AttachContainerResponse { ok: false, message: "..." }.
    //
    // Public v0.2 contract: validation errors may return gRPC
    // InvalidArgument; BPF/core failures may return gRPC Internal; unknown
    // zones, stale generations, and conflicts return ok=false; metadata-only
    // reattach for the same container/zone/cgroup is idempotent and preserves
    // the stored non-zero generation.
    uint64 generation = 8;
}

message AttachContainerResponse {
    bool ok = 1;
    string message = 2;
}

message DetachContainerRequest {
    string container_id = 1;
    string source = 2;
    // Monotonic source generation. Zero detaches regardless of generation for
    // compatibility with callers that do not track source revisions. Non-zero
    // stale detaches return DetachContainerResponse { ok: false, message: "..." }.
    //
    // Public v0.2 contract: validation errors may return gRPC
    // InvalidArgument; internal BPF/core failures may return gRPC Internal; BPF
    // cleanup failure is degraded security and is reported through health.
    uint64 generation = 3;
}

message DetachContainerResponse {
    bool ok = 1;
    string message = 2;
}

// --- Communication policy ---

message AllowCommRequest {
    string zone_a = 1;
    string zone_b = 2;
    // Both directions are enforced atomically.
    // Adapter must ensure symmetry before calling.
    //
    // Public v0.2 contract: empty zone names return gRPC InvalidArgument;
    // zone_a == zone_b is an idempotent no-op (ok=true); an unknown zone
    // returns gRPC NotFound; a BPF/core failure returns gRPC Internal.
}

message AllowCommResponse {
    bool ok = 1;
}

message DenyCommRequest {
    string zone_a = 1;
    string zone_b = 2;
    // Public v0.2 contract: empty zone names return gRPC InvalidArgument;
    // an unknown zone returns gRPC NotFound; a BPF/core failure returns gRPC
    // Internal.
}

message DenyCommResponse {
    bool ok = 1;
}

message ListCommsRequest {
    // If empty, returns all allowed pairs across all zones.
    // If set, returns only pairs involving this zone.
    string zone_name = 1;
}

message ListCommsResponse {
    repeated CommPair pairs = 1;
}

message CommPair {
    string zone_a = 1;
    string zone_b = 2;
}

// --- Pod IP to zone resolution ---

message SetIpZoneRequest {
    // IPv4 pod IP in dotted decimal form. IPv6 IP-to-zone enforcement is a
    // follow-up; IPv6 values return InvalidArgument.
    string ip = 1;
    string zone_name = 2;
}

message SetIpZoneResponse {
    bool ok = 1;
}

message RemoveIpZoneRequest {
    // IPv4 pod IP in dotted decimal form.
    string ip = 1;
}

message RemoveIpZoneResponse {
    bool ok = 1;
}

// --- Inode registration ---

message RegisterHostPathRequest {
    string zone_name = 1;
    string path = 2;
    // If true, recursively scan path and register all inodes.
    bool recursive = 3;
}

message RegisterHostPathResponse {
    uint32 inodes_registered = 1;
}

// --- Status ---

message StatusRequest {}

message StatusResponse {
    bool attached = 1;
    uint32 zones_active = 2;
    uint32 containers_active = 3;
    uint64 uptime_secs = 4;
    repeated HookStatus hooks = 5;
    // BPF Array capacity for ZONE_POLICY — registration fails past this.
    uint32 max_zones = 6;
}

message HookStatus {
    string hook = 1;
    uint64 allow = 2;
    uint64 deny = 3;
    uint64 error = 4;
    uint64 lost = 5;
}

// --- Events ---

message WatchEventsRequest {
    // If true, stream all future deny events.
    // If false, return immediately after draining current buffer.
    bool follow = 1;
}

message DenyEvent {
    uint64 timestamp_ns = 1;
    string hook = 2;
    uint32 zone_id = 3;
    uint32 target_zone_id = 4;
    uint32 pid = 5;
    string comm = 6;
    uint64 inode = 7;
    string context = 8;
}

// --- Policy ---

message ZonePolicy {
    // Filesystem
    repeated string host_paths = 1;

    // Network — communication with other zones
    repeated string allowed_zones = 2;

    // Process
    bool allow_ptrace = 3;

    // Zone type
    ZoneType zone_type = 4;

    // Network mode — the per-zone lock/open switch. ISOLATED (default) is
    // network-locked: the zone reaches loopback only (socket connect/sendmsg/
    // bind to non-loopback are denied). BRIDGED / HOST open network access.
    NetworkMode network_mode = 5;

    // Egress CIDR allowlist for a network-locked zone. Each entry is an IPv4
    // or IPv6 CIDR or bare address; optional destination ports use
    // "10.0.0.0/8:5432" for IPv4 and "[2001:db8::/32]:443" for IPv6.
    repeated string allowed_egress_cidrs = 6;
}

enum ZoneType {
    ZONE_TYPE_STANDARD   = 0;
    ZONE_TYPE_PRIVILEGED = 1;
    ZONE_TYPE_ISOLATED   = 2;
}

enum NetworkMode {
    NETWORK_MODE_ISOLATED = 0; // locked: loopback only
    NETWORK_MODE_BRIDGED  = 1; // open: network allowed
    NETWORK_MODE_HOST     = 2; // open + host network namespace
}
