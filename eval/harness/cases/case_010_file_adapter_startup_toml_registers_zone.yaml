id: case_010_file_adapter_startup_toml_registers_zone
description: File adapter core mode registers TOML policies present at startup.
timeout_secs: 30
spec: |
  Given syva-file starts with --core-socket and a policy directory containing
  TOML files, every valid desired zone appears in syva-core ListZones. Mutual
  allowed_zones declarations converge to a ListComms pair.
