id: case_019_file_adapter_retries_until_core_socket_appears
description: File adapter retries until a missing core socket appears.
timeout_secs: 30
spec: |
  syva-file started with --core-socket pointing at a not-yet-listening socket
  must retry instead of crashing, then reconcile once syva-core appears. The
  executable case skips unless the oracle can control a Linux BPF core process.
source: CLAUDE.md:Architecture / syva-adapter-file and canonical policy shape
requirement: |
  File adapter retries until a missing core socket appears.
observable: |
  The oracle observes only public behavior: syva.core.v1 RPCs, documented
  adapter process exit behavior, adapter-visible filesystem input, or HTTP
  responses from the adapter under test.
failure_means: |
  A failure indicates the externally observed Syva contract differs from
  the cited requirement, or that the cited requirement is underspecified and
  needs an explicit product decision.
