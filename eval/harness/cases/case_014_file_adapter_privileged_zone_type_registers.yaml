id: case_014_file_adapter_privileged_zone_type_registers
description: File adapter accepts privileged zone_type in local-core mode.
timeout_secs: 30
spec: |
  A TOML policy with [zone] type = "privileged" must be accepted by syva-file
  core mode and registered in syva-core. syva.core.v1 does not currently expose
  zone_type on ListZones, so the oracle asserts the externally visible part:
  the zone registers successfully instead of being rejected or ignored.
source: CLAUDE.md:Architecture / syva-adapter-file and canonical policy shape
requirement: |
  File adapter accepts privileged zone_type in local-core mode.
observable: |
  The oracle observes only public behavior: syva.core.v1 RPCs, documented
  adapter process exit behavior, adapter-visible filesystem input, or HTTP
  responses from the adapter under test.
failure_means: |
  A failure indicates the externally observed Syva contract differs from
  the cited requirement, or that the cited requirement is underspecified and
  needs an explicit product decision.
