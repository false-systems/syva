id: case_004_status_includes_max_zones
description: StatusResponse exposes the BPF ZONE_POLICY Array capacity as max_zones.
timeout_secs: 15
spec: |
  max_zones is the ZONE_POLICY BPF Array size — the hard upper bound on the
  number of concurrently registered zones. Adapters use this to warn before
  hitting the cap. Today the constant is 4096; if the BPF map grows, this
  oracle case must be updated in lock-step with the proto and the BPF source.
source: syva-proto/proto/syva_core.proto:StatusResponse and max_zones comment
requirement: |
  StatusResponse exposes the BPF ZONE_POLICY Array capacity as max_zones.
observable: |
  The oracle observes only public behavior: syva.core.v1 RPCs, documented
  adapter process exit behavior, adapter-visible filesystem input, or HTTP
  responses from the adapter under test.
failure_means: |
  A failure indicates the externally observed Syva contract differs from
  the cited requirement, or that the cited requirement is underspecified and
  needs an explicit product decision.
