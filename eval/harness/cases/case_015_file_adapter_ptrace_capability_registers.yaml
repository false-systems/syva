id: case_015_file_adapter_ptrace_capability_registers
description: File adapter accepts CAP_SYS_PTRACE in local-core mode.
timeout_secs: 30
spec: |
  A TOML policy with capabilities.allowed = ["CAP_SYS_PTRACE"] must be accepted
  by syva-file core mode and registered in syva-core. The current core read API
  does not expose allow_ptrace, so registration success is the public contract
  available to the oracle.
source: CLAUDE.md:Architecture / syva-adapter-file and canonical policy shape
requirement: |
  File adapter accepts CAP_SYS_PTRACE in local-core mode.
observable: |
  The oracle observes only public behavior: syva.core.v1 RPCs, documented
  adapter process exit behavior, adapter-visible filesystem input, or HTTP
  responses from the adapter under test.
failure_means: |
  A failure indicates the externally observed Syva contract differs from
  the cited requirement, or that the cited requirement is underspecified and
  needs an explicit product decision.
