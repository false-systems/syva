id: case_005_allow_comm_then_list_surfaces_pair
description: After AllowComm(a,b), ListComms filtered by either zone returns the pair.
timeout_secs: 30
spec: |
  AllowComm writes both directions of the pair to ZONE_ALLOWED_COMMS (BPF map)
  and records it in the userspace mirror used by ListComms. ListComms must
  then return a CommPair containing both names when filtered by either side.
  Pair ordering within CommPair is implementation-defined; the oracle
  canonicalises before comparing.
source: syva-proto/proto/syva_core.proto:Communication policy RPCs and comments
requirement: |
  After AllowComm(a,b), ListComms filtered by either zone returns the pair.
observable: |
  The oracle observes only public behavior: syva.core.v1 RPCs, documented
  adapter process exit behavior, adapter-visible filesystem input, or HTTP
  responses from the adapter under test.
failure_means: |
  A failure indicates the externally observed Syva contract differs from
  the cited requirement, or that the cited requirement is underspecified and
  needs an explicit product decision.
