id: case_033_api_put_zone_updates_core_view
description: API adapter PUT /v1/zones/{name} updates local core.
timeout_secs: 30
spec: |
  In local-core mode, PUT /v1/zones/{name} with a valid policy returns success
  and the zone remains visible in syva-core after the update.
source: CLAUDE.md:Architecture / syva-adapter-api and gRPC API
requirement: |
  API adapter PUT /v1/zones/{name} updates local core.
observable: |
  The oracle observes only public behavior: syva.core.v1 RPCs, documented
  adapter process exit behavior, adapter-visible filesystem input, or HTTP
  responses from the adapter under test.
failure_means: |
  A failure indicates the externally observed Syva contract differs from
  the cited requirement, or that the cited requirement is underspecified and
  needs an explicit product decision.
