name: privileged-runtime

# Kernel-enforcement contract gates on a real kernel. Hosted runners cannot run
# these (no one grants BPF-LSM), so they execute on a self-hosted privileged
# runner — see docs/development/self-hosted-runner.md.
#
# SECURITY: these jobs run `sudo` with BPF/kernel access. They MUST NOT run on
# untrusted code. There is intentionally NO `pull_request` trigger, so a forked
# PR can never execute on the privileged runner. They run only on pushes to the
# canonical repo's main branch, on release tags, and on manual dispatch — and
# the `if:` guard rejects anything that isn't the canonical repository.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: privileged-runtime-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kernel-gates:
    name: kernel enforcement contract
    if: github.repository == 'false-systems/syva'
    runs-on: [self-hosted, linux, bpf-lsm, privileged]
    steps:
      - uses: actions/checkout@v4

      - name: Host evidence
        run: |
          uname -a
          id
          cat /sys/kernel/security/lsm
          test "$(getent group syva)" || { echo "missing 'syva' group"; exit 1; }

      # Load + attach + self-tests (offset chains verified against this kernel).
      - name: verify-runtime
        run: sudo -E make verify-runtime

      # Enforcement — it BLOCKS what it should.
      - name: verify-integration
        run: sudo -E make verify-integration
      - name: verify-container-integration
        run: sudo -E make verify-container-integration
      - name: verify-network-lock
        run: sudo -E make verify-network-lock
      - name: verify-egress-cidr
        run: sudo -E make verify-egress-cidr
      - name: verify-cross-zone-tcp
        run: sudo -E make verify-cross-zone-tcp
      - name: verify-inode-identity
        run: sudo -E make verify-inode-identity

      # The other half — it does NOT over-block. Pairing this with the deny
      # gates above is the whole point: a deny-only suite passes just as happily
      # if the core denies everything. Keep this green before treating the
      # suite as an authoritative gate.
      - name: verify-allow
        run: sudo -E make verify-allow

      # Observability + modes.
      - name: verify-events
        run: sudo -E make verify-events
      - name: verify-audit-mode
        run: sudo -E make verify-audit-mode
      - name: verify-cgroup-escape
        run: sudo -E make verify-cgroup-escape

  # The Kubernetes membership gate needs a single-node cluster on the runner
  # (k3s). Separate job so a runner without a cluster can be configured to skip
  # it without failing the kernel-gates job above.
  k8s-gate:
    name: kubernetes membership contract
    if: github.repository == 'false-systems/syva'
    runs-on: [self-hosted, linux, bpf-lsm, privileged, k8s]
    steps:
      - uses: actions/checkout@v4
      - name: verify-k8s-membership
        run: sudo -E make verify-k8s-membership
